# Repo-root briefcase manifest.
#
# Briefcase reads pyproject.toml from CWD and writes `build/` and
# `dist/` next to it, so this file lives at the repo root — that's
# where the redistributable artefacts (`Voitta.app`, `Voitta-*.dmg`)
# end up.
#
# Backend Python deps and test config still live in
# `backend/pyproject.toml`; this file is briefcase-only.
# `build_app.sh` cd's here before invoking briefcase, using the same
# `backend/.venv` that `backend/run.sh` set up.

[tool.briefcase]
project_name = "Voitta"
bundle = "ai.voitta"
version = "0.1.4"
url = "https://voitta.ai"
license.text = "Proprietary"
author = "Voitta"
author_email = "info@voitta.ai"

[tool.briefcase.app.voitta]
# `formal_name` is the .app filename (output: "Voitta Bookmarklet.app").
# `app_name` (= the table key, "voitta") stays lowercase — that's the
# Python package slug under src/voitta/ and the build dir slug under
# build/voitta/macos/app/. Renaming the slug would force everything
# downstream (the briefcase intermediate dirs, the user data dir, the
# log filename) to be quoted for the space — not worth it.
formal_name = "Voitta Bookmarklet"
description = "Local FastAPI backend + menu-bar shell for the Voitta bookmarklet."
# Bundle icon, generated by `tools/generate_icon.py`. Briefcase resolves
# the path with implicit `.icns` extension on macOS. Without this, the
# .app, every NSAlert, the Dock icon (if it ever showed) and Finder all
# inherit briefcase's stock cartoon icon.
icon = "icons/voitta"
long_description = """
Voitta is a chat sidebar injectable into any HTTPS page via bookmarklet.
This .app runs the local FastAPI backend that the bookmarklet talks to,
exposing it as a macOS menu-bar item.
"""
# Paths are relative to this pyproject.toml (repo root). The shim
# package `src/voitta/` provides the entry-point; the real business
# logic stays in `backend/app/` exactly as it does in development.
sources = [
    "src/voitta",
    "backend/app",
]

# Run-time Python deps shipped INSIDE the .app bundle. The "heavy"
# scientific stack (panel/bokeh/holoviews/hvplot, pandas/scipy,
# matplotlib, chromadb, the netCDF/tables HDF5 family) is *not* in
# this list — it gets pip-installed on first launch into the user
# data dir at ``~/Library/Application Support/Voitta Bookmarklet/
# site-packages/``. See ``backend/app/installer.py`` for the canonical
# heavy-packages list and ``backend/app/install_window.py`` for the
# progress UI shown during that setup.
#
# Why split:
#   • Bundle drops ~870 MB → ~280 MB. Faster downloads, faster
#     code-signing, less disk impact.
#   • The user data dir is writable; the signed bundle is not. Lazy
#     installs there don't break the code signature.
#   • A "Reset…" menu item nukes the data dir; the next launch
#     re-runs first-run setup, so users have a clean recovery path.
requires = [
    # FastAPI server — must be in bundle so chat works the moment
    # the .app starts (after first-run install dialog completes).
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    "sse-starlette>=2.1",
    "httpx>=0.28",
    # LLM provider clients — small, always needed for chat.
    "anthropic>=0.40",
    "openai>=1.50",
    "google-genai>=0.3",
    # MCP transport. ``app.services.mcp.client`` does
    # ``from fastmcp import Client`` at module load; ``app.routes.plugins``
    # pulls in that module unconditionally during startup. So fastmcp
    # MUST be in the bundle — moving it to HEAVY_PACKAGES (first-launch
    # install) doesn't work because the import happens before any
    # installer code can run.
    "fastmcp>=2.0",
    # Foundational scientific primitives. numpy + h5py are touched
    # by core code paths (a4db parser at minimum); pillow is needed
    # for ctx.image() in compute scripts.
    "numpy>=1.26",
    "h5py>=3.10",
    "pillow>=10.0",
    # Small utilities used by tools / web_fetch / RAG-keyword.
    "pypdf>=5.0",
    "tabulate>=0.9",
    "bm25s>=0.2.6",
    "PyStemmer>=2.2.0",
    # macOS UI: rumps is sdist-only on PyPI; briefcase passes
    # --only-binary :all: to pip so we point at a locally pre-built
    # wheel under wheels/. ``build_app.sh`` rebuilds it on first run.
    "./wheels/rumps-0.4.0-py3-none-any.whl",
    "pyobjc-framework-Cocoa>=10.0",
    # pip + setuptools + wheel are bundled so the first-run installer
    # (and any compute script that needs an extra package) can call
    # ``pip._internal.cli.main`` without bootstrapping. Without these
    # the .app could not install anything itself.
    "pip",
    "setuptools",
    "wheel",
]

[tool.briefcase.app.voitta.macOS]
# arm64 only — universal2 doubles bundle size and the scientific
# stack (h5py, scipy, tables) ships arm64-only wheels by default.
universal_build = false
# Default 11.0 excludes scipy/pandas/scientific wheels (minimum macOS
# has crept up to 14.0). Sonoma is also Apple's current security floor.
min_os_version = "14.0"
# Menu-bar app — no Dock icon.
info."LSUIElement" = true
info."NSHumanReadableCopyright" = "© Voitta"

# ---- hardened runtime entitlements ----------------------------------
#
# These are required for Apple notarisation to pass. They have no
# effect on ad-hoc builds (codesign just embeds them; macOS only
# enforces them when the bundle is signed with a Developer ID and
# launched from Gatekeeper). Wiring them in now means the day a real
# Developer ID cert lands, ``./build_app.sh --package --sign … --notarize``
# is a one-shot. Each entitlement here is unavoidable for a Python
# app that ships its own interpreter + a long tail of C extensions:
#
# • allow-jit — Python's bytecode interpreter mprotects RWX pages
#   for some hot paths and certain compiled deps (e.g. anything that
#   uses ctypes' callback-trampoline path). Without this Apple's
#   hardened runtime sends SIGKILL on first execution.
#
# • allow-unsigned-executable-memory — broader umbrella that catches
#   the same pattern in C extensions where mmap of an executable
#   page isn't gated through the JIT path. Belt-and-braces with
#   allow-jit; cheap to set, expensive to debug if missing.
#
# • disable-library-validation — we vendor ~80 C extensions (h5py,
#   scipy, pandas, panel/bokeh, chromadb's rust bindings, …) that
#   are signed by their respective wheel builders, NOT by us. Apple's
#   default library validation refuses to load any dylib whose
#   signature isn't either Apple's or our own team's. Disabling it
#   per-bundle is the standard Python-app pattern; tighter alternatives
#   (re-signing every dylib) are O(hours) per build for no real
#   security gain because we run user-authored Python anyway.
#
# • allow-dyld-environment-variables — briefcase's launcher stub
#   uses DYLD_FRAMEWORK_PATH at startup so the bundled Python.framework
#   is preferred over any system Python. Hardened runtime strips DYLD_*
#   vars by default; this entitlement keeps them.
entitlement."com.apple.security.cs.allow-jit" = true
entitlement."com.apple.security.cs.allow-unsigned-executable-memory" = true
entitlement."com.apple.security.cs.disable-library-validation" = true
entitlement."com.apple.security.cs.allow-dyld-environment-variables" = true
